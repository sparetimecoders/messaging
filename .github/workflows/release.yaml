name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs['typescript--release_created'] }}
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3 # zizmor: ignore[cache-poisoning]
        if: ${{ steps.release.outputs['typescript--release_created'] }}

      - name: Build and publish to GitHub Packages # zizmor: ignore[use-trusted-publishing]
        if: ${{ steps.release.outputs['typescript--release_created'] }}
        working-directory: typescript
        run: |
          bun install --frozen-lockfile
          bun run build
          bun publish --registry https://npm.pkg.github.com
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
