services:
  nats:
    image: nats:latest@sha256:c6876497e2b72cfad58868914b4a688affced496f522f32c343150e135e2140d
    ports:
      - "4222:4222"
    command: ["-js"]
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/4222"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine@sha256:b618738ea52cb6d0073ee9f0412ede133411ecacd7afa40f17be748a6d9a9ee1
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
